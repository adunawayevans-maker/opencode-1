# ==============================================================================
# tmux configuration — clipboard integration for the web terminal
#
# Copying from applications inside tmux (OpenCode) works via OSC 52 escape
# sequences, which must travel: app → tmux → ttyd/xterm.js → browser clipboard.
# Stock tmux breaks this chain in two places; this file repairs both.
# ==============================================================================

# OpenCode detects it is running inside tmux and wraps its OSC 52 sequence in
# a DCS passthrough envelope (\ePtmux;...\e\\). tmux silently discards those
# unless allow-passthrough is enabled (default: off since tmux 3.3).
set -g allow-passthrough on

# Accept raw OSC 52 clipboard writes from applications that don't wrap them,
# and forward them — plus tmux's own copy-mode copies — to the outer terminal.
# The default ("external") ignores clipboard writes from inner applications.
set -s set-clipboard on

# ttyd reports TERM=xterm-256color and tmux assumes OSC 52 support ("Ms"
# capability) for xterm* terminals, but be explicit so clipboard forwarding
# never depends on that heuristic.
set -as terminal-features ',xterm*:clipboard'
